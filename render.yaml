# Render Blueprint — backend + managed PostgreSQL
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: stockhaus-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockhaus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: SEED_SAMPLE_DATA
        value: "true"
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: stockhaus-db
    plan: free
    databaseName: inventory_db
    user: inventory_user
