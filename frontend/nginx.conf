server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
